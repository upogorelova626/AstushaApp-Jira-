<div class="login-card__logo">
    <tui-icon class="login-card__logo-icon" icon="@tui.cat" />

    <span class="login-card__logo-text">AstushaApp</span>
</div>

<h1 class="login-card__title"> Войдите, чтобы продолжить </h1>

<form class="login-card__form">
    <label class="login-card__field">
        <span class="login-card__label"> Электронная почта </span>

        <tui-textfield class="login-card__input" iconStart="@tui.mail">
            <input
                type="email"
                tuiInput
                placeholder="Введите адрес электронной почты"
            />
        </tui-textfield>
    </label>

    <label class="login-card__field">
        <span class="login-card__label"> Пароль </span>

        <tui-textfield
            class="login-card__input"
            iconStart="@tui.lock-keyhole"
            iconEnd="@tui.eye"
        >
            <input type="password" tuiInput placeholder="Введите пароль" />
        </tui-textfield>
    </label>

    <label class="login-card__remember">
        <input class="login-card__checkbox" type="checkbox" />

        <span class="login-card__remember-text"> Запомнить меня </span>
    </label>

    <button
        tuiButton
        class="login-card__submit"
        type="button"
        appearance="primary"
        size="l"
    >
        Продолжить
    </button>

    <div class="login-card__divider"></div>

    <div class="login-card__links">
        <a class="login-card__link" href="/forgot-password">
            Не удается войти?
        </a>

        <span class="login-card__links-separator">•</span>

        <a class="login-card__link" href="/create-account"> Создать аккаунт </a>
    </div>
</form>
